<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Ossetian</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script> 

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- Splash -->

<div id="splash-screen">

    <div class="splash-content">

        <div class="logo">
            🟣
        </div>

        <h1>Learn Ossetian</h1>

        <p>Изучай осетинский язык</p>

        <div class="loader"></div>

    </div>

</div>

<!-- MENU -->

<div id="menu-screen" class="screen">

    <div class="menu-card">

        <h1>Осетинский язык</h1>

        <p>
            Выберите режим обучения
        </p>

        <button id="wordModeBtn" class="menu-btn">
            📖 Угадай слово
        </button>

        <button id="sentenceModeBtn" class="menu-btn">
            💬 Угадай предложение
        </button>

    </div>

</div>

<!-- GAME -->

<div id="game-screen" class="screen" style="display:none;">

    <div class="container">

        <div class="top-card">

            <div class="stat">
                <span>Очки</span>
                <strong id="score">0</strong>
            </div>

            <div class="stat">
                <span>Режим</span>
                <strong id="gameMode">Слова</strong>
            </div> 

            <div class="stat">
                <span>Время</span>
                <strong id="timer">10</strong>
            </div> 

            <div class="stat">
                <span>Жизни</span>
                <strong id="lives">3</strong>
            </div>

            
            

        </div>

        <div class="word-card">

            <div class="label">
                Русский
            </div>

            <h1 id="word">
                Загрузка...
            </h1>

        </div>

        <div class="subtitle">
            Выбери правильный перевод
        </div>

        <div id="answers"></div>

        <div id="result"></div>

        <div class="buttons">

            <button id="backBtn" class="secondary-btn">
                ← В меню
            </button>

            <button onclick="finishGame()" class="primary-btn">
                Завершить игру
            </button>

        </div>

        <div class="leaderboard-card">

            <h3>🏆 Лидерборд</h3>

            <div id="board"></div>

        </div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
